<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Check-in | Movement Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #090714);
            height: 100vh;
            height: 100dvh; /* Altura dinâmica para mobile */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 15px;
            overflow: hidden; /* Impede rolagem da página */
        }

        .tablet-container {
            background: rgba(20, 18, 38, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            width: 100%;
            max-width: 440px;
            height: 100%; /* Ocupa a altura máxima permitida */
            max-height: 850px; /* Limite para não ficar gigante em telas enormes */
            border-radius: 2.5rem;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .display-cpf {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.4);
            font-size: clamp(1.5rem, 5vh, 2.2rem);
            padding: 1.2rem;
        }

        /* Numpad que se expande para ocupar o espaço */
        .grid-numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            flex-grow: 1; /* Faz o teclado ocupar o espaço central */
        }

        .numpad-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1.5rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .numpad-btn:active {
            background: var(--primary);
            transform: scale(0.95);
        }

        /* Botão de Validar Fixo e Adaptável */
        .btn-consultar {
            grid-column: span 3;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 1.25rem;
            min-height: 80px; /* Garante que o botão seja grande e fácil de clicar */
            font-size: 1.1rem;
            box-shadow: 0 10px 20px -5px rgba(109, 40, 217, 0.5);
        }

        .status-box {
            min-height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div class="tablet-container">
    <div class="text-center">
        <h1 class="text-xl font-extrabold tracking-tighter">
            MOVEMENT <span class="text-purple-400">ACADEMY</span>
        </h1>
        <p class="text-gray-400 text-[10px] uppercase tracking-[3px] mt-1">Check-in System</p>
    </div>

    <div id="display" class="display-cpf w-full text-center font-bold rounded-2xl text-white">
        000.000.000-00
    </div>

    <div class="grid-numpad">
        <button class="numpad-btn" onclick="addNum('1')">1</button>
        <button class="numpad-btn" onclick="addNum('2')">2</button>
        <button class="numpad-btn" onclick="addNum('3')">3</button>
        <button class="numpad-btn" onclick="addNum('4')">4</button>
        <button class="numpad-btn" onclick="addNum('5')">5</button>
        <button class="numpad-btn" onclick="addNum('6')">6</button>
        <button class="numpad-btn" onclick="addNum('7')">7</button>
        <button class="numpad-btn" onclick="addNum('8')">8</button>
        <button class="numpad-btn" onclick="addNum('9')">9</button>
        <button class="numpad-btn text-red-400" onclick="limpar()"><i class="fas fa-trash-alt"></i></button>
        <button class="numpad-btn" onclick="addNum('0')">0</button>
        <button class="numpad-btn text-purple-400" onclick="backspace()"><i class="fas fa-backspace"></i></button>
        
        <button onclick="consultarAcesso()" class="numpad-btn btn-consultar flex gap-3">
            <i class="fas fa-fingerprint text-2xl"></i> Validar Acesso
        </button>
    </div>

    <div id="statusBox" class="status-box rounded-2xl p-4 flex flex-col items-center justify-center text-center">
        <div id="statusText" class="font-semibold text-xs tracking-widest text-gray-400 uppercase">Aguardando CPF</div>
        <div id="statusSubtext" class="text-[10px] text-gray-500 mt-1">Digite os 11 dígitos do seu CPF</div>
    </div>
</div>

<script>
    // Mantive sua lógica de script original, apenas integrei ao novo layout
    let cpfAtual = "";
    const API_URL = 'https://catraca-api.vercel.app';

    function updateDisplay() {
        let mask = cpfAtual.padEnd(11, "0");
        let formatted = mask.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
        document.getElementById('display').innerText = formatted;
    }

    function addNum(num) {
        if(cpfAtual.length < 11) {
            cpfAtual += num;
            updateDisplay();
        }
    }

    function backspace() {
        cpfAtual = cpfAtual.slice(0, -1);
        updateDisplay();
    }

    function limpar() {
        cpfAtual = "";
        updateDisplay();
        resetStatus();
    }

    function resetStatus() {
        const text = document.getElementById('statusText');
        const sub = document.getElementById('statusSubtext');
        text.innerText = "AGUARDANDO CPF";
        sub.innerText = "Digite os 11 dígitos do seu CPF";
    }

    async function consultarAcesso() {
        if (cpfAtual.length < 11) return;
        const text = document.getElementById('statusText');
        text.innerText = "CONSULTANDO...";
        // Simulação de fetch (adicione sua lógica de API aqui conforme o código anterior)
    }
</script>

</body>
</html>
